[module/vpn]
type = internal/network
interface = tun0
interface-type = wired
format-font = 2
format-connected = %{F#ff60d090}<label-connected>%{F-}
format-disconnected = %{F#33fdfefe}<label-disconnected>%{F-}
label-connected = "%{A1:vpn disconnect:}connected%{A}"
label-disconnected = "%{A1:vpn connect:}disconnected%{A}"

#ping-interval = 3

#format-connected = <label-connected>
#label-connected = ÔÄí
#label-connected-background = ${colors.bg}
#label-connected-foreground = ${colors.green}
#label-connected-padding = 1

#format-disconnected = <label-disconnected>
#label-disconnected = ÔĀĆ
#label-disconnected-background = ${colors.bg}
#label-disconnected-foreground = ${colors.red}
#label-disconnected-padding = 1

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted-background = ${colors.nord1}
label-mounted-foreground = ${colors.foreground}
label-mounted =  " %{F#81A1C1}Ôā†%{F-} %mountpoint% %percentage_used%% "
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/i3]
pin-workspaces = true
type = internal/i3
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true
format = <label-mode><label-state>
label-mode = %mode%
label-mode-background = ${colors.nord11}
label-mode-foreground = ${colors.nord4}
label-focused-foreground = ${colors.nord2}
label-focused-background = ${colors.background-alt}
label-focused-padding-right = 1
; visible is the focused workspace on non focused monitor, confusing, i know. :)
label-visible-padding-right =1
label-visible-background=${colors.nord3}
label-unfocused-foreground = ${colors.nord4}
label-unfocused-background = ${colors.nord1}
label-unfocused-padding-left = 1
label-unfocused-padding-right = 1
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-urgent-foreground = ${colors.nord4}
label-urgent-background = ${colors.nord11}
label-urgent-padding = 1

[module/mpd]
type = internal/mpd
format-online = <label-song>  <icon-prev> <icon-stop> <toggle> <icon-next>

icon-prev = ÓāĖ
icon-stop = Óāô
icon-play = Óāö
icon-pause = Óāõ
icon-next = Óāú

label-song-maxlen = 25
label-song-ellipsis = true


[module/cpu]
type = internal/cpu
interval = 2
label = Ôčõ%percentage:2%%

format = <label> <ramp-coreload>
format-background = ${colors.nord3}
format-foreground = ${colors.nord4}
format-padding = 2
ramp-coreload-0 = %{F#88C0D0 B#4C566A}‚ĖĀ
ramp-coreload-1 = %{F#88C0D0 B#4C566A}‚Ėā
ramp-coreload-2 = %{F#88C0D0 B#4C566A}‚ĖÉ
ramp-coreload-3 = %{F#88C0D0 B#4C566A}‚ĖĄ
ramp-coreload-4 = %{F#81A1C1 B#4C566A}‚ĖÖ
ramp-coreload-5 = %{F#81A1C1 B#4C566A}‚ĖÜ
ramp-coreload-6 = %{F#81A1C1 B#4C566A}‚Ėá
ramp-coreload-7 = %{F#81A1C1 B#4C566A}‚Ėą


[module/memory]
type = internal/memory
interval = 1
format = <label> <bar-used>
label = "ÔÄď %percentage_used%%"
format-padding = 2
format-background = ${colors.nord2}
format-foreground = ${colors.nord5}

; Only applies if <bar-used> is used
bar-used-indicator =
bar-used-width = 10
bar-used-foreground-0 = ${colors.nord10}
bar-used-foreground-1 = ${colors.nord9}
bar-used-foreground-2 = ${colors.nord8}
bar-used-foreground-3 = ${colors.nord10}
bar-used-fill = ‚Ėź
bar-used-empty = ‚Ėź
bar-used-empty-foreground = ${colors.nord3}

[module/pulseaudio-tail]
type = custom/script
exec = ~/.local/bin/tools/pulseaudio-tail.sh
tail = true
click-right = exec pavucontrol &
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.3%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.3%-
format-background = ${colors.nord7}
format-foreground = ${colors.nord3}
format-padding = 1

[module/time]
type = internal/date
interval = 5
time = %I:%M %p
format-foreground = ${colors.nord5}
format-background = ${colors.nord10}
label = "  ÔÄó %time%  "

[module/battery]
type = internal/battery
; Use $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = AC
full-at = 99
poll-interval = 5
time-format = %H:%M

format-charging    = <animation-charging><label-charging>
format-discharging = <ramp-capacity><label-discharging>
format-full        = <ramp-capacity><label-full>

format-charging-background = ${colors.nord9}
format-charging-foreground = ${colors.nord0}
format-charging-padding = 1
format-discharging-background = ${colors.nord9}
format-discharging-foreground = ${colors.nord0}
format-discharging-padding = 1
format-full-background = ${colors.nord9}
format-full-foreground = ${colors.nord0}
format-full-padding = 1

label-charging = " %percentage%% "
label-discharging = " %percentage%% "
label-full = " %percentage%% "

ramp-capacity-0 = "ÔČĄ"
ramp-capacity-1 = "ÔČÉ"
ramp-capacity-2 = "ÔČā"
ramp-capacity-3 = "ÔČĀ"
ramp-capacity-4 = "ÔČÄ"
;ramp-capacity-0-foreground = ${colors.nord4}
;ramp-capacity-1-foreground = ${colors.nord9}
ramp-capacity-foreground   = ${colors.nord0}

bar-capacity-width = 10
animation-charging-0 = "ÔÉß ÔČĄ"
animation-charging-1 = "ÔÉß ÔČÉ"
animation-charging-2 = "ÔÉß ÔČā"
animation-charging-3 = "ÔÉß ÔČĀ"
animation-charging-4 = "ÔÉß ÔČÄ"
animation-charging-foreground = ${colors.nord0}
animation-charging-framerate = 750

[module/calendar]
type = internal/date
interval = 5
date = %m/%d/%Y
date-alt = " %Y-%m-%d"
format-background = ${colors.nord2}
format-foreground = ${colors.nord5}
label = "  ÔĀ≥ %date%  "

[module/temperature]
type = internal/temperature
zone-type=x86_pkg_temp
thermal-zone = 0
warn-temperature = 70
format-background = ${colors.nord8}
format-foreground = ${colors.nord0}
format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-warn-background = ${colors.nord8}
format-warn-foreground = ${colors.nord0}
label = "%temperature-c% Ôčú "
label-warn = "%temperature-c% ÔĀ≠ "
ramp-2 = "  Ôčá"
ramp-1 = "  ÔčČ"
ramp-0 = "  Ôčč"

[module/powermenu]
type = custom/menu
expand-right = true
format-spacing = 1
label-open = ÓĄĆ
label-open-foreground = ${colors.secondary}
label-close = ÓĀ• cancel
label-close-foreground = ${colors.secondary}
label-separator = |
label-separator-foreground = ${colors.foreground-alt}

menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = power off
menu-0-1-exec = menu-open-2

menu-1-0 = cancel
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = sudo reboot

menu-2-0 = power off
menu-2-0-exec = sudo poweroff
menu-2-1 = cancel
menu-2-1-exec = menu-open-0

[module/alsa-switch]
type = custom/script
click-left = ~/.local/bin/tools/polybar_alsa_module --switch
exec = ~/.local/bin/tools/polybar_alsa_module --mutefg "BF616A" --mutebg "8FBCBB" --bg "8FBCBB" --fg "3B4252"
tail = true


[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over

