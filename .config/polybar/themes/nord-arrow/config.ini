[bar/left]
inherit = bar/base
monitor = ${env:MONITOR_LEFT:""}
height = 20
padding-left = 0
padding-right = 0
module-margin-left = 0
module-margin-right = 0
modules-left =
modules-center =
modules-right = Óā≤ i3


[bar/extra]
