[module/vpn]
type = internal/network
interface = tun0
interface-type = wired
format-font = 2
format-connected = %{F#ff60d090}<label-connected>%{F-}
format-disconnected = %{F#33fdfefe}<label-disconnected>%{F-}
label-connected = "%{A1:vpn disconnect:}connected%{A}"
label-disconnected = "%{A1:vpn connect:}disconnected%{A}"

#ping-interval = 3

#format-connected = <label-connected>
#label-connected = пЂ’
#label-connected-background = ${colors.bg}
#label-connected-foreground = ${colors.green}
#label-connected-padding = 1

#format-disconnected = <label-disconnected>
#label-disconnected = пЃЊ
#label-disconnected-background = ${colors.bg}
#label-disconnected-foreground = ${colors.red}
#label-disconnected-padding = 1

[module/dropbox-watcher]
type = custom/script
exec = isrunning_dropbox.sh
interval = 5
click-left = dropbox-isrunning.sh --toggle
format-background = ${colors.nord2}



[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted-background = ${colors.nord1}
label-mounted-foreground = ${colors.foreground}
label-mounted =  " %{F#81A1C1}п‚ %{F-} %mountpoint% %percentage_used%% "
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/i3]
pin-workspaces = true
type = internal/i3
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true
format = <label-mode><label-state>
label-mode = %mode%
label-mode-background = ${colors.nord11}
label-mode-foreground = ${colors.nord4}
label-focused-foreground = ${colors.nord2}
label-focused-background = ${colors.background-alt}
label-focused-padding-right = 1
; visible is the focused workspace on non focused monitor, confusing, i know. :)
label-visible-padding-right =1
label-visible-background=${colors.nord3}
label-unfocused-foreground = ${colors.nord4}
label-unfocused-background = ${colors.nord1}
label-unfocused-padding-left = 1
label-unfocused-padding-right = 1
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-urgent-foreground = ${colors.nord4}
label-urgent-background = ${colors.nord11}
label-urgent-padding = 1

[module/mpd]
type = internal/mpd
format-online = <label-song>  <icon-prev> <icon-stop> <toggle> <icon-next>

icon-prev = о‚–
icon-stop = о‚™
icon-play = о‚љ
icon-pause = о‚›
icon-next = о‚њ

label-song-maxlen = 25
label-song-ellipsis = true


[module/cpu]
type = internal/cpu
interval = 2
label = п‹›%percentage:2%%

format = <label> <ramp-coreload>
format-background = ${colors.nord10}
format-foreground = ${colors.nord4}
#ramp-coreload-background = ${colors.nord9}
#ramp-coreload-foreground = ${colors.nord4}
format-padding = 2
ramp-coreload-0 = %{F#5E81AC B#4C566A}в–Ѓ
ramp-coreload-1 = %{F#5E81AC B#4C566A}в–‚
ramp-coreload-2 = %{F#81A1C1 B#4C566A}в–ѓ
ramp-coreload-3 = %{F#81A1C1 B#4C566A}в–„
ramp-coreload-4 = %{F#81A1C1 B#4C566A}в–…
ramp-coreload-5 = %{F#88C0D0 B#4C566A}в–†
ramp-coreload-6 = %{F#88C0D0 B#4C566A}в–‡
ramp-coreload-7 = %{F#88C0D0 B#4C566A}в–€


[module/memory]
type = internal/memory
interval = 1
format = <label> <bar-used>
label = "пЂ“ %percentage_used%%" 
format-padding = 2
format-background = ${colors.nord2}
format-foreground = ${colors.nord5}

; Only applies if <bar-used> is used
bar-used-indicator =
bar-used-width = 10
bar-used-foreground-0 = ${colors.nord10}
bar-used-foreground-1 = ${colors.nord9}
bar-used-foreground-2 = ${colors.nord8}
bar-used-foreground-3 = ${colors.nord10}
bar-used-fill = в–ђ
bar-used-empty = в–ђ
bar-used-empty-foreground = ${colors.nord3}

[module/pulseaudio-tail]
type = custom/script
exec = ~/.local/bin/tools/pulseaudio-tail.sh
tail = true
click-right = exec pavucontrol &
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.3%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.3%-
format-padding = 1

[module/time]
type = internal/date
interval = 5
time = %I:%M %p
format-foreground = ${colors.nord5}
format-background = ${colors.nord10}
label = "  пЂ— %time%  "

[module/battery]
type = internal/battery
; Use $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = AC
full-at = 99
poll-interval = 5
time-format = %H:%M

format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <ramp-capacity> <label-full>
format-background = ${colors.nord9}
format-foreground = ${colors.nord2}

ramp-capacity-0 = п‰„
ramp-capacity-1 = п‰ѓ
ramp-capacity-2 = п‰‚
ramp-capacity-3 = п‰Ѓ
ramp-capacity-4 = п‰Ђ
label-charging-background = ${colors.nord3}
;ramp-capacity-0-foreground = ${colors.nord4}
;ramp-capacity-1-foreground = ${colors.nord9}
;ramp-capacity-foreground   = ${colors.nord3}

bar-capacity-width = 10
animation-charging-0 = "пѓ§ п‰„"
animation-charging-1 = "пѓ§ п‰ѓ"
animation-charging-2 = "пѓ§ п‰‚"
animation-charging-3 = "пѓ§ п‰Ѓ"
animation-charging-4 = "пѓ§ п‰Ђ"
animation-charging-framerate = 750

[module/calendar]
type = internal/date
interval = 5
date = %m/%d/%Y
date-alt = " %Y-%m-%d"
format-background = ${colors.nord2}
format-foreground = ${colors.nord5}
label = "  пЃі %date%  "

[module/temperature]
type = internal/temperature
zone-type=x86_pkg_temp
thermal-zone = 0
warn-temperature = 70
format-background = ${colors.nord8}
format-foreground = ${colors.nord0}
format = <ramp> <label>
format-warn = <ramp> <label-warn>
label = "%temperature-c% п‹њ "
label-warn = "%temperature-c% пЃ­ "
ramp-2 = "  п‹‡"
ramp-1 = "  п‹‰"
ramp-0 = "  п‹‹"

[module/powermenu]
type = custom/menu
expand-right = true
format-spacing = 1
label-open = о„Њ
label-open-foreground = ${colors.secondary}
label-close = оЃҐ cancel
label-close-foreground = ${colors.secondary}
label-separator = |
label-separator-foreground = ${colors.foreground-alt}

menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = power off
menu-0-1-exec = menu-open-2

menu-1-0 = cancel
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = sudo reboot

menu-2-0 = power off
menu-2-0-exec = sudo poweroff
menu-2-1 = cancel
menu-2-1-exec = menu-open-0

[module/alsa-switch]
type = custom/script
click-left = ~/.local/bin/tools/polybar_alsa_module --switch
exec = ~/.local/bin/tools/polybar_alsa_module --mutefg "BF616A" --mutebg "88C0D0" --bg "88C0D0" --fg "3B4252"
tail = true


[settings]
screenchange-reload = true
