[bar/main]
inherit = bar/base
monitor = ${env:MONITOR_MAIN}
fixed-center = true
width = 100%
height = 30
padding-left = 0
padding-right = 0
module-margin-left = 0
module-margin-right = 0
modules-left = i3 Óāį-i3
modules-center =
modules-right = Óā≤ filesystem  Óā≤-volume2 Óā≤-volume alsa-switch pulseaudio-tail Óā≤-temp2 Óā≤-temp temperature Óā≤-bat battery Óā≤-time time Óā≤-calendar2 Óā≤-calendar calendar
# Óā≤-memory2 Óā≤-memory memory Óā≤-cpu2 Óā≤-cpu cpu


