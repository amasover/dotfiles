[bar/base]
background = ${colors.background}
foreground = ${colors.foreground}

[colors]
# include-file = $HOME/.config/polybar/nord/colors
background = ${colors.nord0}
background-alt = ${colors.nord9}
foreground = ${colors.nord4}
