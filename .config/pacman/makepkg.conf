# User-level makepkg overrides — read after /etc/makepkg.conf (pacman ≥ 6.1).
# Tracked by yadm: it lands with the clone, so bootstrap needs no makepkg step.
# Build-speed oriented; source verification (checksums, PGP) is untouched.

# !debug: Arch defaults build -debug split packages. They're never declared,
#   and Electron-bundling AUR packages ship IDENTICAL .build-id files in their
#   -debug splits — pacman file conflicts then killed whole unattended batches
#   (feishin-bin-debug vs storageexplorer-debug, 2.7 VM).
# !check: abandoned-upstream AUR packages fail their own test suites on modern
#   toolchains and abort unattended rebuilds (2.7 VM).
OPTIONS+=(!debug !check)

# All cores; the shipped default is commented out (= effectively serial).
MAKEFLAGS="-j$(nproc)"

# Don't compress packages: they exist to be installed locally seconds after
# building, and zstd-ing multi-GB Electron trees is pure waste. Cost: a fatter
# ~/.cache/yay. (Adopted from the live machine's hand tweak.)
PKGEXT='.pkg.tar'
