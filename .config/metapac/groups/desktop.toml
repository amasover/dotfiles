# metapac group: desktop — Xorg/i3 session, GPU, fonts, themes, session utilities
# Membership source: docs/package-inventory.md; adopted in Story 2.8.
# polybar-wireguard-git is the machine's only polybar (provides "polybar") — declare the
# real name, not the alias (knowledge/reference/pacman-provides-and-binary-ownership.md).
# Aaron uses its indicator to show VPN connectivity in the bottom bar, and may reuse it
# on other machines for VPN status — it stays in desktop (not work) because it is also
# the bar itself.
# bluez/bluez-utils/bluetui: post-inventory arrivals, placed here as session hardware (2.8 call).
[arch]
packages = [
  "adobe-source-code-pro-fonts",
  "alacritty",
  "arandr",
  "arc-gtk-theme",
  "arc-solid-gtk-theme",
