# metapac group: development — languages, runtimes, VCS, containers, dev tools
# Membership source: docs/package-inventory.md; adopted in Story 2.8.
# docker/docker-compose are decided drops (D5) — intentionally NOT declared here.
# nodejs-vmd: KEPT per C3 (.spacemacs markdown preview); tied to Story 3.2.
# nodejs/npm are managed by nvm (update loop), not pacman — not declared.
# dotnet/aspnet: official extra packages (Story 2.25) — the AUR -bin family
# conflicted with repo dotnet-runtime that storageexplorer's dep pulls in.
# runc pins podman's `oci-runtime` provider (Story 2.26; host runs runc, unattended
# default was crun).
[arch]
packages = [
  "ansible",
  "ansible-aur-git",
  "aspnet-runtime",
  "aspnet-runtime-9.0",
  "bfg",
  "brew-git",
  "changie",
  "claude-code",
  "clitest",  # shell-test runner — this repo's own tests/*.clitest.txt suites
  "cloc",
  "debtap",
  "dotnet-sdk",
  "dotnet-sdk-9.0",
  "facter",
  "git",
  "git-credential-manager-bin",
  "github-cli",
  "go",
  "go-tools",
  "golangci-lint-bin",
  "gource",
  "graphviz",
  "groovy",
  "mercurial",
  "mono-msbuild",
  "nodejs-vmd",
  "nuget",
  "podman",
  "podman-compose",
  "powershell-bin",
  "runc",
  "pyenv",
  "python-pip",
  "python-pipx",
  "python-pymssql",
  "rust",  # repo rust, not rustup: satisfies AUR makedeps, updates via pacman; no Rust dev here (2.7 review)
  "shellcheck",
  "shfmt",
  "strace",
  "unixodbc",
  "uv",
  "valkey",  # redis replaced in the repos (2.23, Aaron's call 2026-07-19); provides redis
]
